<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">agent-rec report screenshot</title>
  <desc id="desc">A dark themed agent-rec report showing a timeline, process output, and git diff panes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="48" y="44" width="1184" height="672" rx="24" fill="#020617" filter="url(#shadow)"/>
  <rect x="48" y="44" width="1184" height="88" rx="24" fill="#111827"/>
  <text x="84" y="94" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="34" font-weight="700">agent-rec report</text>
  <rect x="385" y="70" width="256" height="28" rx="14" fill="#1e293b" stroke="#475569"/>
  <text x="404" y="90" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo" font-size="14">session example-session</text>
  <text x="672" y="91" fill="#86efac" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">exit 0</text>

  <line x1="376" y1="132" x2="376" y2="716" stroke="#263044"/>
  <text x="84" y="176" fill="#e5e7eb" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="700">Timeline</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo" font-size="14">
    <rect x="84" y="202" width="252" height="74" rx="12" fill="#111827" stroke="#263044"/>
    <text x="104" y="232" fill="#93c5fd" font-weight="700">session.started</text>
    <text x="104" y="258" fill="#94a3b8">python -m pytest -q</text>

    <rect x="84" y="292" width="252" height="74" rx="12" fill="#111827" stroke="#263044"/>
    <text x="104" y="322" fill="#93c5fd" font-weight="700">process.output</text>
    <text x="104" y="348" fill="#94a3b8">.. [100%]</text>

    <rect x="84" y="382" width="252" height="74" rx="12" fill="#111827" stroke="#263044"/>
    <text x="104" y="412" fill="#93c5fd" font-weight="700">git.snapshot</text>
    <text x="104" y="438" fill="#94a3b8">1 changed file</text>

    <rect x="84" y="472" width="252" height="74" rx="12" fill="#111827" stroke="#263044"/>
    <text x="104" y="502" fill="#93c5fd" font-weight="700">session.finished</text>
    <text x="104" y="528" fill="#94a3b8">duration 1234ms</text>
  </g>

  <text x="416" y="176" fill="#e5e7eb" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="700">Changed files</text>
  <rect x="416" y="198" width="760" height="42" rx="10" fill="#111827" stroke="#263044"/>
  <text x="438" y="225" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo" font-size="15">src/example.py</text>

  <text x="416" y="292" fill="#e5e7eb" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">Process output</text>
  <rect x="416" y="314" width="360" height="310" rx="14" fill="#020617" stroke="#263044"/>
  <text x="440" y="354" fill="#d1d5db" font-family="ui-monospace, SFMono-Regular, Menlo" font-size="15">$ python -m pytest -q</text>
  <text x="440" y="388" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo" font-size="15">.. [100%]</text>
  <text x="440" y="422" fill="#d1d5db" font-family="ui-monospace, SFMono-Regular, Menlo" font-size="15">2 passed in 0.18s</text>

  <text x="816" y="292" fill="#e5e7eb" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">Git diff</text>
  <rect x="816" y="314" width="360" height="310" rx="14" fill="#020617" stroke="#263044"/>
  <text x="840" y="354" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo" font-size="14">diff --git a/src/example.py</text>
  <text x="840" y="388" fill="#86efac" font-family="ui-monospace, SFMono-Regular, Menlo" font-size="14">+print('hello from agent-rec')</text>
  <text x="840" y="422" fill="#fca5a5" font-family="ui-monospace, SFMono-Regular, Menlo" font-size="14">[REDACTED:openai_key]</text>

  <rect x="416" y="650" width="760" height="38" rx="19" fill="#172554" stroke="#1d4ed8"/>
  <text x="438" y="675" fill="#bfdbfe" font-family="Inter, ui-sans-serif, system-ui" font-size="15">Local JSONL trace → scrubbed report → shareable repro bundle</text>
</svg>
